name: Build Jolt Physics

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: 'ビルド対象プラットフォーム'
        required: true
        type: choice
        options:
          - all
          - macos_arm64
          - ios_device_arm64
          - ios_simulator_arm64
          - android_arm64_v8a
          - windows_x64
          - web_wasm

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos_arm64
          - name: ios_device_arm64
          - name: ios_simulator_arm64
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'macos_arm64' ||
      github.event.inputs.platform == 'ios_device_arm64' ||
      github.event.inputs.platform == 'ios_simulator_arm64'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ${{ matrix.platform.name }} をビルドする
        run: python3 run.py build ${{ matrix.platform.name }}

      - name: スモークテストを実行する
        run: python3 run.py test ${{ matrix.platform.name }}

      - name: 成果物をパッケージングする
        run: python3 run.py package ${{ matrix.platform.name }}

      - name: 成果物をアップロードする
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jolt.${{ matrix.platform.name }}.tar.gz
          path: _package/${{ matrix.platform.name }}/*.tar.gz
          retention-days: 7

  build-android:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android_arm64_v8a'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Android NDK をセットアップする
        id: setup-ndk
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        with:
          ndk-version: r29

      - name: android_arm64_v8a をビルドする
        run: python3 run.py build android_arm64_v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: スモークテストを実行する
        run: python3 run.py test android_arm64_v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: 成果物をパッケージングする
        run: python3 run.py package android_arm64_v8a

      - name: 成果物をアップロードする
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jolt.android_arm64_v8a.tar.gz
          path: _package/android_arm64_v8a/*.tar.gz
          retention-days: 7

  build-windows:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'windows_x64'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: ビルドツールをインストールする
        run: choco install ninja cmake --yes

      - name: windows_x64 をビルドする
        run: python run.py build windows_x64

      - name: スモークテストを実行する
        run: python run.py test windows_x64

      - name: 成果物をパッケージングする
        run: python run.py package windows_x64

      - name: 成果物をアップロードする
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jolt.windows_x64.tar.gz
          path: _package/windows_x64/*.tar.gz
          retention-days: 7

  build-web:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'web_wasm'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ビルドツールをインストールする
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Emscripten SDK をセットアップする
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 3.1.60

      - name: web_wasm をビルドする
        run: python3 run.py build web_wasm

      - name: スモークテストを実行する
        run: python3 run.py test web_wasm

      - name: 成果物をパッケージングする
        run: python3 run.py package web_wasm

      - name: 成果物をアップロードする
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jolt.web_wasm.tar.gz
          path: _package/web_wasm/*.tar.gz
          retention-days: 7

  create-release:
    if: contains(github.ref, 'tags/v')
    needs:
      - build-macos
      - build-android
      - build-windows
      - build-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 全成果物をダウンロードする
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Release を作成する
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
