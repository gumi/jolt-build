name: Build Jolt Physics

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: 'ビルド対象プラットフォーム'
        required: true
        type: choice
        options:
          - all
          - macos_arm64
          - ios_device_arm64
          - ios_simulator_arm64
          - android_arm64_v8a

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos_arm64
          - name: ios_device_arm64
          - name: ios_simulator_arm64
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'macos_arm64' ||
      github.event.inputs.platform == 'ios_device_arm64' ||
      github.event.inputs.platform == 'ios_simulator_arm64'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: ${{ matrix.platform.name }} をビルドする
        run: python3 run.py build ${{ matrix.platform.name }}

      - name: 成果物をパッケージングする
        run: python3 run.py package ${{ matrix.platform.name }}

      - name: 成果物をアップロードする
        uses: actions/upload-artifact@v7
        with:
          name: jolt.${{ matrix.platform.name }}.tar.gz
          path: _package/${{ matrix.platform.name }}/*.tar.gz
          retention-days: 7

  build-android:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android_arm64_v8a'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Android NDK をセットアップする
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: android_arm64_v8a をビルドする
        run: python3 run.py build android_arm64_v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: 成果物をパッケージングする
        run: python3 run.py package android_arm64_v8a

      - name: 成果物をアップロードする
        uses: actions/upload-artifact@v7
        with:
          name: jolt.android_arm64_v8a.tar.gz
          path: _package/android_arm64_v8a/*.tar.gz
          retention-days: 7

  create-release:
    if: contains(github.ref, 'tags/v')
    needs:
      - build-macos
      - build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 全成果物をダウンロードする
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Release を作成する
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
